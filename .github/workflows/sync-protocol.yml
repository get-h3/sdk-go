name: Sync Protocol

on:
  repository_dispatch:
    types: [protocol-update]
  workflow_dispatch:

env:
  GO_VERSION: "1.23"

jobs:
  sync:
    name: Sync & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sdk-go
        uses: actions/checkout@v4
        with:
          path: sdk-go
          fetch-depth: 0

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: get-h3/protocol
          path: protocol
          ref: ${{ github.event.client_payload.ref || 'main' }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Copy schemas into SDK
        run: |
          rm -rf sdk-go/schemas/v1
          cp -r protocol/schemas/v1 sdk-go/schemas/v1
          echo "Schemas synced from protocol repo (${{ github.event.client_payload.ref || 'main' }})"

      - name: Regenerate types from schemas
        working-directory: sdk-go
        run: |
          go generate ./protocol/...
          echo "Types regenerated"

      - name: Verify no dirty files
        working-directory: sdk-go
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changed files after regeneration:"
            git diff --stat
          else
            echo "No changes — types match current schemas"
          fi

      - name: Build
        working-directory: sdk-go
        run: go build ./...

      - name: Vet
        working-directory: sdk-go
        run: go vet ./...

      - name: Test
        working-directory: sdk-go
        run: go test ./... -count=1 -short -race

      - name: Determine tag
        id: tag
        working-directory: sdk-go
        run: |
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            TAG="v${{ github.event.client_payload.version }}"
          else
            TAG="v$(date +'%Y.%m.%d')-sync"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

      - name: Create tag
        working-directory: sdk-go
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Sync protocol schemas — ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## Protocol Sync

            - Schemas synced from `get-h3/protocol@${{ github.event.client_payload.ref || 'main' }}`
            - Types regenerated
            - All tests passing

            Auto-generated by Sync Protocol workflow.
          generate_release_notes: false
