project: "h3-sdk-go"
language: "go"

guards:
  secrets:
    enabled: true
    severity: block
  build:
    enabled: true
  lint:
    enabled: true
  tests:
    enabled: true
  dead_code:
    enabled: false

test:
  mode: full
  test_command: "go test ./... -count=1 -short"

commit:
  require_guard_pass: true
